services:
  hevy-mcp:
    image: ghcr.io/bondbenbond/hevy-mcp:${IMAGE_TAG}
    container_name: hevy-mcp
    restart: unless-stopped
    environment:
      HEVY_API_KEY: ${HEVY_API_KEY}
      HEVY_API_BASE_URL: ${HEVY_API_BASE_URL:-https://api.hevyapp.com}
      OAUTH_ISSUER_URI: ${OAUTH_ISSUER_URI}
      OAUTH_AUDIENCE: ${OAUTH_AUDIENCE}
      MCP_RESOURCE_URI: ${MCP_RESOURCE_URI}
      MCP_SERVER_NAME: ${MCP_SERVER_NAME:-hevy-mcp}
      SERVER_PORT: ${SERVER_PORT:-8080}
    expose:
      - "${SERVER_PORT:-8080}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      caddy-net:
        aliases:
          - hevy-mcp

networks:
  caddy-net:
    external: true
